    <!-- Service Worker: only use in production. During local/dev unregister old workers and clear caches. -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          const host = location.hostname
          const isLocal =
            host === 'localhost' ||
            host === '127.0.0.1' ||
            host.startsWith('10.') ||
            host.startsWith('192.168.') ||
            host === ''

          if (isLocal) {
            // In development, unregister any existing service workers and clear caches
            navigator.serviceWorker
              .getRegistrations()
              .then((regs) => {
                regs.forEach((r) => r.unregister())
              })
              .catch(() => {})
            if (window.caches && window.caches.keys) {
              caches
                .keys()
                .then((keys) => keys.forEach((k) => caches.delete(k)))
                .catch(() => {})
            }
            return
          }

          // In non-local environments, register the service worker
          navigator.serviceWorker
            .register('/sw.js')
            .then((registration) => {
              console.log('SW registered: ', registration)
            })
            .catch((registrationError) => {
              console.log('SW registration failed: ', registrationError)
            })
        })
      }
    </script>
  </body>
